site_name: CUNY_course

theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/logo.svg

plugins:
  - coverage:
  - mkdocstrings:
      handlers:
        python:
          rendering:
            show_root_heading: true
  - search
  - print-site:
      enumerate_headings: false

markdown_extensions:
  - admonition
  - codehilite
  - mdx_include
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - css/custom.css

nav:
  - README: index.md
  - API: api.md
  - Coverage Report: coverage.md
  - Developer Guide: dev_guide.md
